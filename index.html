<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Pure Pulse</title>

  <link rel="stylesheet" href="style/main.css" />
</head>

<body>

  <!-- TITLE SCREEN -->
  <section id="title-screen" class="screen active">
    <div class="title-container">
      <h1 class="game-title">THE PURE PULSE</h1>
      <button id="start-btn" class="primary-btn">Start Journey</button>
      <button id="how-to-play-btn" class="secondary-btn">How to Play</button>
      <p class="global-impact">Global Impact: 12,450,200 Liters Delivered</p>
    </div>
  </section>

  <!-- GAME SCREEN -->
  <section id="game-screen" class="screen hidden">
    <header class="top-bar">
      <div class="purity">Purity: <span id="purity-value">0%</span></div>
      <div class="level-name">Level 1: Malawi</div>
      <div class="sustainability">Sustain: <span id="sustain-value">100%</span></div>
    </header>

    <div id="grid-container"></div>

    <div class="rhythm-zone">
      <button id="pulse-btn" class="pulse-btn">TAP THE PULSE</button>
      <p id="tap-feedback" class="tap-feedback"></p>
    </div>

    <div class="inventory">
      <div class="inv-item">BioSand</div>
      <div class="inv-item">Charcoal</div>
      <div class="inv-item">Sensor</div>
    </div>

    <div class="game-btns">
      <button id="pause-btn" class="secondary-btn">Pause</button>
      <button id="reset-btn" class="secondary-btn">Reset Level</button>
      <button id="back-to-menu-btn" class="secondary-btn">Main Menu</button>
    </div>
  </section>

  <!-- IMPACT REPORT -->
  <section id="impact-screen" class="screen hidden">
    <div class="impact-container">
      <h2>Project Completed</h2>

      <div class="impact-photo"></div>

      <div class="impact-stats">
        <p>Liters Filtered: <span id="liters-value">0</span>L</p>
        <p>Hours Saved: <span id="hours-value">0</span></p>
        <p>Monitoring: <span id="monitor-value">100%</span></p>
      </div>

      <button id="share-btn" class="primary-btn">Share Your Impact</button>
      <button id="play-again-btn" class="secondary-btn">Keep the Pulse Going</button>
      <button id="back-to-menu-btn-impact" class="secondary-btn">Main Menu</button>
      <button id="replay-tutorial-btn" class="secondary-btn">Replay Tutorial</button>
    </div>
  </section>

  <!-- TUTORIAL SCREEN -->
  <section id="tutorial-screen" class="screen hidden">

    <div id="tutorial-text"></div>

    <button id="tutorial-next-btn" class="primary-btn">Next</button>
    <button id="tutorial-tap-btn" class="primary-btn hidden">Tap</button>

    <button id="tutorial-exit-btn" class="secondary-btn">Exit Tutorial</button>
    <button id="tutorial-skip-btn" class="secondary-btn">Skip Tutorial</button>

  </section>

  <!-- Scripts -->
  <script type="module" src="scripts/game.js"></script>

</body>

</html>
